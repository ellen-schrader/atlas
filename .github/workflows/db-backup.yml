# Nightly logical backup of the hosted Supabase database (DEPLOYMENT_PLAN.md
# phase 2, backups). Stopgap for the free plan's lack of automated backups:
# schema + data dumps land as workflow artifacts (repo is private), 30-day
# retention. Does NOT cover the mood-board storage bucket. Replace with
# Supabase Pro backups/PITR when the lab depends on the data.
name: db-backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper-radar
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref eegjxioiidymmiizflkh
      - run: |
          mkdir -p backup
          supabase db dump -f backup/schema.sql
          supabase db dump --data-only -f backup/data.sql
      - uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: paper-radar/backup/
          retention-days: 30
          if-no-files-found: error
