# Nightly logical backup of the hosted Supabase database (DEPLOYMENT_PLAN.md
# phase 2, backups). Stopgap for the free plan's lack of automated backups.
#
# The dump is ENCRYPTED (gpg symmetric, AES256, BACKUP_PASSPHRASE secret) before
# it is stored as a workflow artifact, so it is safe even in a public repo —
# without the passphrase the artifact is useless. The job fails closed if the
# passphrase secret is missing, so it can never write a plaintext dump.
#
# IMPORTANT: before making the repo public, delete every db-backup artifact
# created before this encryption was added (they hold plaintext dumps):
#   gh run list --workflow db-backup.yml --json databaseId -q '.[].databaseId' \
#     | xargs -I{} gh api -X DELETE repos/<owner>/<repo>/actions/runs/{}
# Does NOT cover the mood-board storage bucket. Prefer Supabase Pro PITR when
# the lab depends on the data.
name: db-backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper-radar
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          version: 2.108.0
      - run: supabase link --project-ref eegjxioiidymmiizflkh
      - name: Dump and encrypt
        run: |
          if [ -z "$BACKUP_PASSPHRASE" ]; then
            echo "::error::BACKUP_PASSPHRASE secret is not set; refusing to write a plaintext dump." >&2
            exit 1
          fi
          mkdir -p backup
          supabase db dump -f backup/schema.sql
          supabase db dump --data-only -f backup/data.sql
          tar -czf backup/dump.tgz -C backup schema.sql data.sql
          gpg --batch --yes --symmetric --cipher-algo AES256 \
              --passphrase "$BACKUP_PASSPHRASE" \
              -o backup/dump.tgz.gpg backup/dump.tgz
          # Never leave the plaintext dump where upload-artifact could pick it up.
          rm -f backup/schema.sql backup/data.sql backup/dump.tgz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: db-backup-${{ github.run_id }}
          path: paper-radar/backup/dump.tgz.gpg
          retention-days: 30
          if-no-files-found: error
