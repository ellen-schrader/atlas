# Production deploy on merge to main (docs/DEPLOYMENT_PLAN.md phase 4).
# Order matters: migrations land before the API so code never runs ahead of
# schema. The web deploys independently via Vercel's git integration.
name: deploy

on:
  push:
    branches: [main]
    # web/ deploys via Vercel's git integration and docs never touch the image
    # or schema, so neither should trigger a DB push + API rebuild.
    paths:
      - "paper-radar/**"
      - "!paper-radar/web/**"
      - "!paper-radar/docs/**"
      - ".github/workflows/deploy.yml"

# Least privilege: these jobs only read the repo. Third-party actions are pinned
# to commit SHAs so a moved tag/branch can't inject code into a secret-bearing job.
permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper-radar
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Only needed if db push can't authenticate with the access token alone;
      # harmless when the secret is unset.
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          version: 2.108.0
      - run: supabase link --project-ref eegjxioiidymmiizflkh
      - run: supabase db push

  deploy-api:
    needs: migrate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper-radar
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master @ 2026-07 (pinned)
      - run: flyctl deploy --remote-only
