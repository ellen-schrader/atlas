# Production deploy on merge to main (docs/DEPLOYMENT_PLAN.md phase 4).
# Order matters: migrations land before the API so code never runs ahead of
# schema. The web deploys independently via Vercel's git integration.
name: deploy

on:
  push:
    branches: [main]
    # web/ deploys via Vercel's git integration and docs never touch the image
    # or schema, so neither should trigger a DB push + API rebuild.
    paths:
      - "paper-radar/**"
      - "!paper-radar/web/**"
      - "!paper-radar/docs/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper-radar
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Only needed if db push can't authenticate with the access token alone;
      # harmless when the secret is unset.
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref eegjxioiidymmiizflkh
      - run: supabase db push

  deploy-api:
    needs: migrate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper-radar
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
